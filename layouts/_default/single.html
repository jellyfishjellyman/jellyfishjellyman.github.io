{{ define "main" }}
<article class="post-single mw8 center ph3 pv4">
  {{ if eq .Section "posts" }}
    <header class="post-single-header">
      <span class="post-category">{{ .Params.category | default "其他" }}</span>
      <h1>{{ .Title }}</h1>
      <div class="post-meta">
        {{ .Date.Format "2006-01-02" }}{{ with .ReadingTime }} · {{ . }} 分钟阅读{{ end }}
      </div>
    </header>
  {{ end }}

  <div class="lh-copy mt4 post-content">
    {{ .Content }}
  </div>

  <hr>

  <!-- Giscus 评论开始 -->
  <script src="https://giscus.app/client.js"
        data-repo="jellyfishjellyman/jellyfishjellyman.github.io"
        data-repo-id="R_kgDORL8r7A"
        data-category-id="DIC_kwDORL8r7M4C2FPd"
        data-mapping="pathname"
        data-strict="0"
        data-reactions-enabled="1"
        data-emit-metadata="0"
        data-input-position="bottom"
        data-theme="preferred_color_scheme"
        data-lang="zh-CN"
        crossorigin="anonymous"
        async>
  </script>
  <!-- Giscus 评论结束 -->

</article>
{{ end }}
