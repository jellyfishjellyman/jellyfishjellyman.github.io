{{ define "main" }}
<section class="module-page">
  <div class="module-intro reveal-on-scroll">
    <p class="eyebrow">Games</p>
    <h1>{{ .Title }}</h1>
    <div class="module-copy">{{ .Content }}</div>
  </div>

  <div class="game-grid">
    {{ range site.Data.games }}
      <article class="game-card reveal-on-scroll">
        <div>
          <span class="game-status">{{ .status }}</span>
          <h2>{{ .name }}</h2>
          <p>{{ .description }}</p>
        </div>
        {{ if .url }}
          <a class="ghost-button" href="{{ .url }}" {{ if hasPrefix .url "http" }}target="_blank" rel="noopener noreferrer"{{ end }}>开始</a>
        {{ else }}
          <button class="ghost-button" type="button" disabled>准备中</button>
        {{ end }}
      </article>
    {{ end }}
  </div>
</section>
{{ end }}
