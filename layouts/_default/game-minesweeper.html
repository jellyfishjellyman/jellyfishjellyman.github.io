{{ define "main" }}
<section class="game-play-page">
  <div class="game-shell game-shell-wide reveal-on-scroll" data-game="minesweeper">
    <div class="game-panel">
      <p class="eyebrow">Game</p>
      <h1>{{ .Title }}</h1>
      <div class="module-copy">{{ .Content }}</div>

      <div class="score-row score-row-three" aria-label="扫雷状态">
        <div>
          <span>雷数</span>
          <strong id="mineCount">10</strong>
        </div>
        <div>
          <span>时间</span>
          <strong id="mineTimer">0</strong>
        </div>
        <div>
          <span>状态</span>
          <strong id="mineState">待命</strong>
        </div>
      </div>

      <div class="game-actions">
        <button class="primary-button" id="restartMines" type="button">重新开始</button>
        <button class="ghost-button" id="difficultyMines" type="button">普通</button>
        <a class="ghost-button" href="/games/">返回游戏</a>
      </div>
    </div>

    <div class="board-wrap mine-wrap">
      <div id="mineBoard" class="mine-board" role="grid" aria-label="扫雷棋盘"></div>
      <p id="mineMessage" class="game-message" aria-live="polite"></p>
    </div>
  </div>
</section>
<script src="/js/game-minesweeper.js" defer></script>
{{ end }}
