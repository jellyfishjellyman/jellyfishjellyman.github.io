{{ define "main" }}
<section class="module-page guestbook-page">
  <div class="module-intro reveal-on-scroll">
    <p class="eyebrow">Guestbook</p>
    <h1>{{ .Title }}</h1>
    <div class="module-copy">{{ .Content }}</div>
  </div>

  <div
    class="guestbook-shell reveal-on-scroll"
    data-guestbook
    data-api="https://gwbblog-guestbook-api.demon1jellyfish.workers.dev"
    data-turnstile-site-key="0x4AAAAAADfcpoEMKo6pARJz"
  >
    <form class="guestbook-form" data-guestbook-form>
      <div class="guestbook-field">
        <label for="guestName">昵称</label>
        <input id="guestName" name="name" type="text" maxlength="20" autocomplete="name" placeholder="怎么称呼你" required>
      </div>
      <div class="guestbook-field">
        <label for="guestMessage">留言</label>
        <textarea id="guestMessage" name="message" maxlength="200" rows="4" placeholder="贴一张小纸条，最多 200 字" required></textarea>
      </div>
      <div class="guestbook-form-row">
        <div class="guestbook-turnstile" data-guestbook-turnstile></div>
        <button class="primary-button" type="submit">贴上纸条</button>
      </div>
      <p class="guestbook-status" data-guestbook-status aria-live="polite"></p>
    </form>

    <div class="guestbook-board" aria-label="游客留言纸条" data-guestbook-list>
      <article class="guest-note note-blue">
        <span>留言加载中</span>
        <strong>正在翻找大家贴过的小纸条。</strong>
        <em>请稍候</em>
      </article>
    </div>
  </div>
</section>
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit" async defer></script>
{{ end }}
