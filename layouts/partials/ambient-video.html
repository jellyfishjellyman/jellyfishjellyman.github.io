{{- $base := .base -}}
{{- $class := .class | default "ambient-bg-video" -}}
{{- $autoplay := .autoplay | default false -}}
{{- $preload := .preload | default "metadata" -}}
{{- if $base -}}
<video
  class="{{ $class }}"
  {{ if $autoplay }}autoplay{{ end }}
  muted
  loop
  playsinline
  preload="{{ $preload }}"
  poster="/videos/{{ $base }}-poster.jpg"
  aria-hidden="true"
>
  <source src="/videos/{{ $base }}.webm" type="video/webm">
  <source src="/videos/{{ $base }}.mp4" type="video/mp4">
</video>
{{- end -}}
