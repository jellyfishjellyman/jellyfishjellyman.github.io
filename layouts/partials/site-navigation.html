<nav class="site-nav" role="navigation" aria-label="主导航">
  <a class="site-brand" href="{{ .Site.Home.RelPermalink }}" aria-label="{{ .Site.Title }}">
    {{ with .Site.Params.site_logo }}
      <img src="{{ relURL . }}" alt="" />
    {{ end }}
    <span>{{ .Site.Title }}</span>
  </a>

  {{ if .Site.Menus.main }}
    <button class="site-menu-toggle" type="button" aria-label="打开导航" aria-expanded="false" aria-controls="siteMenu" data-menu-toggle>
      <span aria-hidden="true"></span>
    </button>

    <ul id="siteMenu" class="site-menu" data-site-menu>
      {{ $current := .RelPermalink }}
      {{ range .Site.Menus.main }}
        {{ $active := or (eq .URL $current) (and (ne .URL "/") (hasPrefix $current .URL)) }}
        <li>
          <a class="{{ if $active }}is-active{{ end }}" href="{{ .URL }}">{{ .Name }}</a>
        </li>
      {{ end }}
    </ul>
  {{ end }}

  <button class="theme-toggle" type="button" aria-label="切换主题" aria-pressed="false" data-theme-toggle>
    <span aria-hidden="true"></span>
  </button>
</nav>
