{{ define "main" }}
<section class="module-page posts-page">
  <div class="home-grid posts-grid">
    {{ range .Paginator.Pages }}
      <article class="post-card reveal-on-scroll">
        <h2>
          <a href="{{ .RelPermalink }}">{{ .Title }}</a>
        </h2>

        <div class="post-meta">
          {{ .Date.Format "2006-01-02" }}{{ with .ReadingTime }} · {{ . }} 分钟阅读{{ end }}
        </div>

        <div class="post-summary">
          {{ .Summary | plainify | truncate 900 }}
        </div>
      </article>
    {{ end }}
  </div>

  {{ template "_internal/pagination.html" . }}
</section>
{{ end }}
