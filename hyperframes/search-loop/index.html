<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Search Loop</title>
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #f8f5ee;
      font-family: Inter, Arial, sans-serif;
    }

    [data-composition-id="search-loop"] {
      position: relative;
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background:
        radial-gradient(720px circle at 16% 16%, rgba(237, 249, 246, .96), transparent 72%),
        radial-gradient(780px circle at 84% 78%, rgba(240, 166, 201, .22), transparent 72%),
        linear-gradient(135deg, #f8f5ee 0%, #f4faf7 48%, #eef5ff 100%);
      color: #315aa4;
    }

    .grid-haze,
    .connection-field,
    .scan,
    .soft-vignette {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .grid-haze {
      z-index: 1;
      opacity: .22;
      background-image:
        linear-gradient(rgba(49, 90, 164, .11) 1px, transparent 1px),
        linear-gradient(90deg, rgba(49, 90, 164, .09) 1px, transparent 1px);
      background-size: 110px 110px;
      mask-image: linear-gradient(90deg, transparent, #000 14%, #000 86%, transparent);
    }

    .scene-content {
      position: relative;
      z-index: 3;
      box-sizing: border-box;
      width: 100%;
      height: 100%;
      padding: 116px 150px;
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      grid-template-rows: repeat(8, 1fr);
      gap: 24px;
    }

    .search-input {
      grid-column: 3 / span 8;
      grid-row: 2 / span 1;
      position: relative;
      height: 104px;
      border: 1px solid rgba(126, 162, 214, .48);
      border-radius: 34px;
      background: rgba(255, 255, 255, .62);
      box-shadow: 0 24px 90px rgba(61, 95, 148, .12);
      backdrop-filter: blur(20px);
      overflow: hidden;
      will-change: transform, opacity;
    }

    .search-input::before {
      content: "";
      position: absolute;
      left: 42px;
      top: 32px;
      width: 36px;
      height: 36px;
      border: 4px solid rgba(49, 90, 164, .32);
      border-radius: 999px;
    }

    .search-input::after {
      content: "";
      position: absolute;
      left: 72px;
      top: 66px;
      width: 24px;
      height: 4px;
      border-radius: 999px;
      background: rgba(49, 90, 164, .32);
      transform: rotate(42deg);
      transform-origin: left center;
    }

    .input-line {
      position: absolute;
      left: 126px;
      top: 42px;
      width: 56%;
      height: 18px;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(49, 90, 164, .18), rgba(107, 207, 197, .2), rgba(49, 90, 164, .08));
    }

    .cursor {
      position: absolute;
      left: 678px;
      top: 34px;
      width: 3px;
      height: 36px;
      border-radius: 999px;
      background: rgba(240, 166, 201, .7);
      box-shadow: 0 0 22px rgba(240, 166, 201, .35);
    }

    .result-list {
      grid-column: 5 / span 4;
      grid-row: 5 / span 3;
      position: relative;
      border: 1px solid rgba(126, 162, 214, .34);
      border-radius: 24px;
      background: rgba(255, 255, 255, .52);
      box-shadow: 0 28px 92px rgba(61, 95, 148, .12);
      backdrop-filter: blur(20px);
      padding: 34px 36px;
      overflow: hidden;
      will-change: transform, opacity;
    }

    .result-list span {
      display: block;
      height: 18px;
      margin-bottom: 22px;
      border-radius: 999px;
      background: rgba(49, 90, 164, .13);
    }

    .result-list span:nth-child(2),
    .result-list span:nth-child(4) {
      width: 74%;
      background: rgba(107, 207, 197, .17);
    }

    .result-list span:nth-child(1) { width: 88%; }
    .result-list span:nth-child(3) { width: 62%; }
    .result-list span:nth-child(5) { width: 79%; }

    .search-card {
      position: relative;
      box-sizing: border-box;
      padding: 24px;
      border: 1px solid rgba(126, 162, 214, .4);
      border-radius: 22px;
      background: rgba(255, 255, 255, .56);
      box-shadow: 0 22px 72px rgba(61, 95, 148, .12);
      backdrop-filter: blur(18px);
      overflow: hidden;
      will-change: transform, opacity, filter;
    }

    .search-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(210px circle at 14% 10%, rgba(107, 207, 197, .16), transparent 64%),
        radial-gradient(230px circle at 90% 100%, rgba(240, 166, 201, .12), transparent 64%);
    }

    .search-card strong {
      position: relative;
      z-index: 1;
      display: inline-flex;
      align-items: center;
      height: 38px;
      padding: 0 18px;
      border: 1px solid rgba(126, 162, 214, .34);
      border-radius: 999px;
      background: rgba(255, 255, 255, .5);
      color: rgba(49, 90, 164, .78);
      font-size: 24px;
      line-height: 1;
      font-weight: 700;
    }

    .search-card span {
      position: relative;
      z-index: 1;
      display: block;
      width: 70%;
      height: 14px;
      margin-top: 28px;
      border-radius: 999px;
      background: rgba(49, 90, 164, .13);
    }

    .search-card span + span {
      width: 48%;
      margin-top: 13px;
      background: rgba(107, 207, 197, .16);
    }

    .card-post { grid-column: 2 / span 3; grid-row: 4 / span 2; }
    .card-resource { grid-column: 2 / span 3; grid-row: 6 / span 2; }
    .card-tool { grid-column: 9 / span 3; grid-row: 4 / span 2; }
    .card-game { grid-column: 9 / span 3; grid-row: 6 / span 2; }

    .connection-field {
      z-index: 2;
    }

    .connection-field svg {
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    .connection-line {
      stroke: rgba(49, 90, 164, .22);
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      will-change: opacity, stroke-dashoffset;
    }

    .connection-line.accent {
      stroke: rgba(107, 207, 197, .36);
    }

    .clue {
      position: absolute;
      z-index: 4;
      width: 12px;
      height: 12px;
      border-radius: 999px;
      background: rgba(107, 207, 197, .78);
      box-shadow: 0 0 22px rgba(107, 207, 197, .38);
      will-change: transform, opacity;
    }

    .clue.rose {
      background: rgba(240, 166, 201, .76);
      box-shadow: 0 0 22px rgba(240, 166, 201, .36);
    }

    .k1 { left: 704px; top: 314px; }
    .k2 { left: 820px; top: 312px; }
    .k3 { left: 936px; top: 312px; }
    .k4 { left: 1052px; top: 314px; }
    .k5 { left: 960px; top: 630px; }

    .scan {
      z-index: 5;
      width: 32%;
      opacity: .48;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, .58), rgba(107, 207, 197, .12), transparent);
      filter: blur(10px);
      transform: skewX(-12deg) translateX(-130%);
    }

    .soft-vignette {
      z-index: 6;
      box-shadow: inset 0 0 155px rgba(255, 255, 255, .78);
    }
  </style>
</head>
<body>
  <div data-composition-id="search-loop" data-start="0" data-duration="7" data-track-index="0" data-width="1920" data-height="1080">
    <div class="grid-haze" aria-hidden="true"></div>
    <div class="connection-field" aria-hidden="true">
      <svg viewBox="0 0 1920 1080" preserveAspectRatio="none">
        <path class="connection-line accent" d="M704 314 C570 382 492 470 382 514" />
        <path class="connection-line" d="M820 312 C640 506 554 660 390 746" />
        <path class="connection-line accent" d="M936 312 C1100 384 1236 456 1402 512" />
        <path class="connection-line" d="M1052 314 C1234 510 1340 652 1420 744" />
        <path class="connection-line accent" d="M704 314 C798 448 872 542 960 630" />
        <path class="connection-line" d="M1052 314 C1012 426 982 532 960 630" />
      </svg>
    </div>

    <span class="clue k1"></span>
    <span class="clue rose k2"></span>
    <span class="clue k3"></span>
    <span class="clue rose k4"></span>
    <span class="clue k5"></span>

    <div class="scene-content">
      <div class="search-input">
        <span class="input-line"></span>
        <span class="cursor"></span>
      </div>

      <article class="search-card card-post"><strong>文章</strong><span></span><span></span></article>
      <article class="search-card card-resource"><strong>资源</strong><span></span><span></span></article>
      <article class="search-card card-tool"><strong>工具</strong><span></span><span></span></article>
      <article class="search-card card-game"><strong>游戏</strong><span></span><span></span></article>

      <div class="result-list">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>

    <div class="scan" aria-hidden="true"></div>
    <div class="soft-vignette" aria-hidden="true"></div>
  </div>

  <script src="./assets/gsap.min.js"></script>
  <script>
    window.__timelines = window.__timelines || {};
    const tl = gsap.timeline({ paused: true, defaults: { ease: "sine.inOut" } });

    tl.fromTo(".grid-haze", { x: -10, y: -8, opacity: .18 }, { x: 10, y: 8, opacity: .28, duration: 3.5, yoyo: true, repeat: 1 }, 0);
    tl.fromTo(".search-input", { scale: .992, opacity: .74 }, { scale: 1.012, opacity: .92, duration: 3.5, yoyo: true, repeat: 1 }, 0);
    tl.fromTo(".cursor", { opacity: .28, scaleY: .8 }, { opacity: .82, scaleY: 1.08, duration: .7, yoyo: true, repeat: 9 }, 0);
    tl.fromTo(".scan", { x: "-130%" }, { x: "430%", duration: 7, ease: "sine.inOut" }, 0);
    tl.fromTo(".search-card", { y: 16, opacity: .5, filter: "blur(6px)" }, { y: -8, opacity: .86, filter: "blur(0px)", duration: 3.5, yoyo: true, repeat: 1, stagger: { each: .18, from: "center" } }, 0);
    tl.fromTo(".result-list", { y: 14, opacity: .5, filter: "blur(5px)" }, { y: -6, opacity: .86, filter: "blur(0px)", duration: 3.5, yoyo: true, repeat: 1 }, 0);
    tl.fromTo(".clue", { y: -10, scale: .76, opacity: .44 }, { y: 10, scale: 1.12, opacity: .86, duration: 3.5, yoyo: true, repeat: 1, stagger: { each: .12, from: "center" } }, 0);
    tl.fromTo(".connection-line", { strokeDasharray: 600, strokeDashoffset: 120, opacity: .24 }, { strokeDashoffset: -120, opacity: .54, duration: 3.5, yoyo: true, repeat: 1, stagger: .08 }, 0);

    window.__timelines["search-loop"] = tl;
  </script>
</body>
</html>
