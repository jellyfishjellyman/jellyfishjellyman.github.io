<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Resource Tools Loop</title>
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #f8f5ee;
      font-family: Inter, Arial, sans-serif;
    }

    [data-composition-id="resource-tools-loop"] {
      position: relative;
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background:
        radial-gradient(720px circle at 12% 18%, rgba(235, 248, 245, .94), transparent 72%),
        radial-gradient(760px circle at 84% 76%, rgba(240, 166, 201, .28), transparent 70%),
        linear-gradient(135deg, #f8f5ee 0%, #f3f8f6 48%, #eef5ff 100%);
      color: #2f58a5;
    }

    .scene-content {
      position: relative;
      z-index: 3;
      box-sizing: border-box;
      width: 100%;
      height: 100%;
      padding: 112px 150px;
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      grid-template-rows: repeat(7, 1fr);
      gap: 26px;
    }

    .grid-haze,
    .connection-field,
    .search-scan,
    .soft-vignette {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .grid-haze {
      z-index: 1;
      opacity: .28;
      background-image:
        linear-gradient(rgba(47, 88, 165, .11) 1px, transparent 1px),
        linear-gradient(90deg, rgba(47, 88, 165, .1) 1px, transparent 1px);
      background-size: 104px 104px;
      mask-image: linear-gradient(90deg, transparent, #000 16%, #000 84%, transparent);
    }

    .connection-field {
      z-index: 2;
    }

    .connection-field svg {
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    .connection-line {
      stroke: rgba(47, 88, 165, .22);
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      will-change: opacity, stroke-dashoffset;
    }

    .connection-line.accent {
      stroke: rgba(107, 207, 197, .36);
    }

    .search-scan {
      z-index: 5;
      width: 35%;
      opacity: .62;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, .62), rgba(107, 207, 197, .16), transparent);
      filter: blur(9px);
      transform: skewX(-13deg) translateX(-130%);
    }

    .bookmark-card {
      position: relative;
      box-sizing: border-box;
      padding: 22px 24px;
      border: 1px solid rgba(127, 163, 216, .44);
      border-radius: 18px;
      background: rgba(255, 255, 255, .62);
      box-shadow: 0 26px 80px rgba(61, 95, 148, .14);
      backdrop-filter: blur(18px);
      overflow: hidden;
      will-change: transform, opacity, filter;
    }

    .bookmark-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(220px circle at 12% 10%, rgba(107, 207, 197, .16), transparent 64%),
        radial-gradient(220px circle at 90% 100%, rgba(240, 166, 201, .12), transparent 62%);
      pointer-events: none;
    }

    .bookmark-card::after {
      content: "";
      position: absolute;
      left: 24px;
      right: 24px;
      bottom: 22px;
      height: 34px;
      border-radius: 12px;
      border: 1px solid rgba(127, 163, 216, .22);
      background:
        linear-gradient(90deg, rgba(47, 88, 165, .15) 0 20%, transparent 20% 30%, rgba(107, 207, 197, .16) 30% 62%, transparent 62%),
        rgba(248, 251, 255, .48);
    }

    .bookmark-card strong {
      position: relative;
      z-index: 1;
      display: inline-block;
      padding: 6px 12px;
      border: 1px solid rgba(127, 163, 216, .36);
      border-radius: 999px;
      background: rgba(255, 255, 255, .52);
      color: rgba(47, 88, 165, .78);
      font-size: 20px;
      line-height: 1;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .bookmark-card span {
      position: relative;
      z-index: 1;
      display: block;
      width: 70%;
      height: 13px;
      margin-top: 22px;
      border-radius: 999px;
      background: rgba(47, 88, 165, .15);
    }

    .bookmark-card span + span {
      width: 48%;
      margin-top: 12px;
      background: rgba(107, 207, 197, .18);
    }

    .c1 { grid-column: 2 / span 3; grid-row: 2 / span 2; }
    .c2 { grid-column: 5 / span 3; grid-row: 1 / span 2; }
    .c3 { grid-column: 8 / span 3; grid-row: 2 / span 2; }
    .c4 { grid-column: 3 / span 3; grid-row: 5 / span 2; }
    .c5 { grid-column: 6 / span 3; grid-row: 4 / span 2; }
    .c6 { grid-column: 9 / span 3; grid-row: 5 / span 2; }

    .focus-orb {
      position: absolute;
      z-index: 2;
      left: 50%;
      top: 50%;
      width: 520px;
      height: 520px;
      border-radius: 999px;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, rgba(255, 255, 255, .46), rgba(235, 248, 245, .18) 44%, transparent 72%);
      filter: blur(8px);
      opacity: .72;
    }

    .node {
      position: absolute;
      z-index: 4;
      width: 11px;
      height: 11px;
      border-radius: 999px;
      background: rgba(240, 166, 201, .72);
      box-shadow: 0 0 20px rgba(240, 166, 201, .42);
      will-change: transform, opacity;
    }

    .node.mint {
      background: rgba(107, 207, 197, .72);
      box-shadow: 0 0 20px rgba(107, 207, 197, .38);
    }

    .n1 { left: 444px; top: 262px; }
    .n2 { left: 802px; top: 188px; }
    .n3 { left: 1252px; top: 306px; }
    .n4 { left: 620px; top: 716px; }
    .n5 { left: 960px; top: 560px; }
    .n6 { left: 1420px; top: 754px; }

    .soft-vignette {
      z-index: 6;
      box-shadow: inset 0 0 150px rgba(255, 255, 255, .78);
    }
  </style>
</head>
<body>
  <div data-composition-id="resource-tools-loop" data-width="1920" data-height="1080">
    <div class="grid-haze" aria-hidden="true"></div>
    <div class="focus-orb" aria-hidden="true"></div>
    <div class="connection-field" aria-hidden="true">
      <svg viewBox="0 0 1920 1080" preserveAspectRatio="none">
        <path class="connection-line accent" d="M444 262 C620 174 670 150 802 188" />
        <path class="connection-line" d="M802 188 C980 210 1090 250 1252 306" />
        <path class="connection-line" d="M444 262 C520 440 562 600 620 716" />
        <path class="connection-line accent" d="M620 716 C760 616 840 566 960 560" />
        <path class="connection-line" d="M960 560 C1128 602 1260 680 1420 754" />
        <path class="connection-line accent" d="M1252 306 C1320 450 1370 610 1420 754" />
      </svg>
    </div>

    <span class="node mint n1"></span>
    <span class="node n2"></span>
    <span class="node mint n3"></span>
    <span class="node n4"></span>
    <span class="node mint n5"></span>
    <span class="node n6"></span>

    <div class="scene-content">
      <article class="bookmark-card c1"><strong>links</strong><span></span><span></span></article>
      <article class="bookmark-card c2"><strong>index</strong><span></span><span></span></article>
      <article class="bookmark-card c3"><strong>tools</strong><span></span><span></span></article>
      <article class="bookmark-card c4"><strong>notes</strong><span></span><span></span></article>
      <article class="bookmark-card c5"><strong>ideas</strong><span></span><span></span></article>
      <article class="bookmark-card c6"><strong>search</strong><span></span><span></span></article>
    </div>

    <div class="search-scan" aria-hidden="true"></div>
    <div class="soft-vignette" aria-hidden="true"></div>
  </div>

  <script src="./assets/gsap.min.js"></script>
  <script>
    window.__timelines = window.__timelines || {};
    const tl = gsap.timeline({ paused: true, defaults: { ease: "sine.inOut" } });

    tl.fromTo(".grid-haze", { x: -14, y: -8, opacity: .22 }, { x: 14, y: 8, opacity: .32, duration: 4, yoyo: true, repeat: 1 }, 0);
    tl.fromTo(".focus-orb", { scale: .985, opacity: .58 }, { scale: 1.02, opacity: .78, duration: 4, yoyo: true, repeat: 1 }, 0);
    tl.fromTo(".search-scan", { x: "-130%" }, { x: "420%", duration: 8, ease: "sine.inOut" }, 0);
    tl.fromTo(".bookmark-card", { y: 18, opacity: .54, filter: "blur(7px)" }, { y: -10, opacity: .9, filter: "blur(0px)", duration: 4, yoyo: true, repeat: 1, stagger: { each: .16, from: "center" } }, 0);
    tl.fromTo(".node", { y: -8, scale: .8, opacity: .46 }, { y: 10, scale: 1.1, opacity: .86, duration: 4, yoyo: true, repeat: 1, stagger: { each: .14, from: "center" } }, 0);
    tl.fromTo(".connection-line", { strokeDasharray: 560, strokeDashoffset: 90, opacity: .28 }, { strokeDashoffset: -90, opacity: .58, duration: 4, yoyo: true, repeat: 1, stagger: .08 }, 0);

    window.__timelines["resource-tools-loop"] = tl;
  </script>
</body>
</html>
